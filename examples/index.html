<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wangEditor example</title>
    <style>

    </style>
</head>

<body>
    <p>
        wangEditor demo
        <button onclick="addText1()">addText</button>
        <button onclick="addText2()">addText</button>
        <button onclick="addText3()">addText</button>
        <button onclick="addText4()">addText</button>
        <button onclick="getText ()"> getText</button>
    </p>
    <div id="div1">
        <!-- <img src="#" alt=""> -->
        <!-- <input type="text" name="" id=""> -->
    </div>
    <div class="box">

    </div>

    <script src="../dist/wangEditor.js"></script>
    <script>
        // 改为使用var声明，才能在window对象上获取到编辑器实例，方便e2e测试
        var E = window.wangEditor
        var editor = new E('#div1 ')
        editor.config.hasPOrBr = false
        editor.config.onchange = function(newHtml) {
            console.log('onchange', newHtml)
        }
        editor.config.onblur = function(newHtml) {
            // console.log('onblur', newHtml)
        }
        editor.config.placeholder = '请输入...'
            // editor.config.onfocus = function (newHtml) {
            //     console.log('onfocus', newHtml)
            // }
            // editor.config.fontNames = [
            //     '宋体',
            //     '微软雅黑',
            // ]

        // 这行代码用来测试不同屏幕宽度，panel菜单的位置
        // editor.config.menus = [
        //     'image'
        // ] 

        editor.config.showFullScreen = true
        editor.create()


        function addText1() {
            editor.cmd.do("insertHTML",
                "{<imgn></imgn>图片新闻,0,8_680_300_380_285_93561_1_0_160_0<imgnover></imgnover>}&nbsp;&nbsp;")
        }

        function addText2() {
            editor.cmd.do("insertHTML",
                "{<imgs></imgs>滚动图片,0,6_900_18_10612_0_default_dying2.gif<imgsover></imgsover>}&nbsp;&nbsp;")
        }

        function addText3() {
            editor.cmd.do("insertHTML",
                "{<slt></slt>测试2_7386<sltover></sltover>}&nbsp;&nbsp;")
        }

        function addText4() {
            editor.cmd.do("insertHTML",
                "{<lt></lt>当前栏目_15_L_P_0_0_0<ltover></ltover>}&nbsp;&nbsp;")
        }

        function getText() {
            let a = editor.txt.html()
            document.querySelector('.box').textContent = a
            console.log(' editor.txt.html: ', a);
        }
    </script>
</body>

</html>
